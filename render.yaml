# render.yaml — положи в корень репозитория
# Render автоматически подхватит этот файл

databases:
  - name: spectre-db
    plan: free
    databaseName: spectre
    user: spectre

services:
  - type: web
    name: spectre-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: spectre-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false # задашь вручную в дашборде
      - key: FRONTEND_URL
        sync: false # URL от Vercel
      - key: CHAT_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_TELEGRAM_ID
        sync: false
